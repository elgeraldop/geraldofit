<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geraldo Fit - Transformación 40+</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; margin:0; background:#0a0a0a; color:#fff; }
        header { background: linear-gradient(90deg, #ff4081, #3f51b5); padding:1.5rem; text-align:center; border-radius:0 0 24px 24px; }
        nav { display:flex; flex-wrap:wrap; justify-content:space-around; background:#16213e; padding:0.8rem; position:sticky; top:0; z-index:10; gap:5px; }
        .tab { display:none; padding:1rem; }
        .tab.active { display:block; }
        button { background:linear-gradient(90deg,#ff4081,#ff80ab); color:white; border:none; padding:12px 20px; margin:6px; border-radius:12px; font-weight:600; cursor:pointer; }
        .card { background:#16213e; margin:12px 0; padding:18px; border-radius:16px; box-shadow:0 4px 20px rgba(0,0,0,0.4); }
        .exercise { background:#0f3460; padding:16px; border-radius:12px; margin:10px 0; }
        img { width:100%; border-radius:12px; margin:8px 0; }
        .done { text-decoration: line-through; color: #4ade80; }
    </style>
</head>
<body>
    <header><h1>🏋️‍♂️ Geraldo Fit</h1><p>40+ • Masa + Definición • Jeft Style</p></header>
    <nav>
        <button onclick="showTab(0)">🏠 Inicio</button>
        <button onclick="showTab(1)">📅 Rutinas Detalladas</button>
        <button onclick="showTab(2)">🍲 Dieta</button>
        <button onclick="showTab(3)">💪 Tracker Progreso</button>
        <button onclick="showTab(4)">💊 Suplementos</button>
    </nav>

    <div id="tab0" class="tab active"> ... (bienvenida) </div>
    <div id="tab1" class="tab"><div id="routines-content"></div></div>
    <div id="tab2" class="tab"><div id="diet-content"></div></div>
    <div id="tab3" class="tab"><div id="tracker-content"></div></div>
    <div id="tab4" class="tab"><div id="supp-content"></div></div>

    <script src="app.js"></script>
</body>
</html>
